apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-node-app
  labels:
    app: devops-node-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-node-app
  template:
    metadata:
      labels:
        app: devops-node-app
    spec:
      containers:
        - name: devops-node-app
          image: IMAGE_URI_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: APP_NAME
              value: "DevOps CI/CD Node.js App"
            - name: STUDENT_NAME
              value: "M Salman"
            - name: APP_VERSION
              value: "1.0.0"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: devops-node-service
spec:
  type: NodePort
  selector:
    app: devops-node-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
